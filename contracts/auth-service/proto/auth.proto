syntax="proto3";
package auth;

option go_package="github.com/LBRT87/PersiapanOnsite/contracts/auth-service/gen";

service AuthService {
    rpc VerifyToken (VerifyTokenRequest) returns (VerifyTokenResponse);
    rpc GetUser (GetUserRequest) returns (GetUserResponse);
}

message VerifyTokenResponse {
    uint64 user_id = 1;
    string email=2;
    string username=3;
    string role=4;
    bool is_verified=5;
}

message VerifyTokenRequest {
    string token =1;
}

message GetUserRequest {
    uint64 user_id = 1;
}

message GetUserResponse {
    uint6464 id = 1;
    string username=2;
    string email=3;
    string role=4;
}